# Quality Gate — jannahclinic
# Example CI workflow. Activate by pushing to the default branch and
# configuring your CI environment. This file is inert until activated.

name: Quality Gate

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jannahclinic
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: xdebug

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install Node dependencies and build
        run: npm ci && npm run build

      - name: Prepare environment
        run: cp .env.example .env && php artisan key:generate

      - name: Linter (Pint)
        run: ./vendor/bin/pint --test

      - name: Static Analysis (Larastan)
        run: ./vendor/bin/phpstan analyse --no-progress

      - name: Tests (Pest)
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          DB_DATABASE: jannahclinic
        run: php artisan test

      - name: Check money float types
        run: |
          grep -rEn 'decimal|float|double' app database 2>/dev/null | grep -i 'price\|amount\|fee\|total' && (echo 'Review money columns for float usage (must be DECIMAL)' && exit 1) || exit 0

      - name: Check logical CSS properties (no physical directional props)
        run: |
          ! grep -rn --include="*.css" --include="*.vue" -E "(margin-left|margin-right|padding-left|padding-right|text-align:\s*(left|right)|float:\s*(left|right))" resources/js/
